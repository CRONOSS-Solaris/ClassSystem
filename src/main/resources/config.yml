# ============================================================
#  ClassSystem — konfiguracja
#  Klucze: angielskie, hierarchia kropkowa (np. general.language).
#  Komentarze i wartości tekstowe widoczne dla operatora — po polsku.
#
#  configVersion: NIE edytować ręcznie — ConfigMigrator porównuje je z wersją
#  w JARze i przy bumpie dolewa nowe klucze, zachowując Twoje ustawienia
#  (backup zapisywany jako config.yml.backup-<timestamp>).
# ============================================================
configVersion: 0.3.0

# 1. Podstawy
general:
  # Master switch pluginu — false blokuje komendę /klasa.
  enabled: true
  # Język plików z Translations/ — 'pl' lub 'en'. Brakujący klucz → fallback do pl.yml.
  language: pl

# 2. Baza danych (ten sam schemat persystencji co CitySystem).
database:
  # SQLITE, MYSQL lub MARIADB.
  type: SQLITE
  # Prefiks tabel SQL.
  table-prefix: cls_
  sqlite:
    file: data.db
    journal-mode: WAL

# 3. Debug
debug:
  # Verbose logi diagnostyczne (DebugLogger). Włączać tylko podczas diagnozy problemu.
  enabled: false
  # Dodatkowo loguj operacje bazy danych (tylko gdy debug.enabled: true).
  log-database-operations: false

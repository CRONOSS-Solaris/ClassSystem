# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                                                                           ║
# ║                          ClassSystem — config.yml                         ║
# ║                                                                           ║
# ║   Sekcje (w kolejności):                                                  ║
# ║                                                                           ║
# ║     PODSTAWY                                                              ║
# ║      1. GENERAL          — podstawowe ustawienia pluginu                  ║
# ║      2. DEBUG            — logowanie diagnostyczne                        ║
# ║      3. DATABASE         — przechowywanie danych (SQLite/MySQL/MariaDB)   ║
# ║                                                                           ║
# ╚═══════════════════════════════════════════════════════════════════════════╝


# Wersja schematu konfiguracji. Nie edytuj — automatyczny config-updater pluginu
# (ConfigMigrator) porównuje to pole z wersją w JARze i przy starcie dolewa nowe
# klucze, zachowując Twoje wartości. Stary plik trafia do *.backup-{timestamp}.
configVersion: 0.3.0


# ════════════════════════════════════════════════════════════════════════════
#  1. GENERAL — podstawowe ustawienia
# ════════════════════════════════════════════════════════════════════════════
general:
  # Czy włączyć plugin (master-switch). false → komenda /klasa zwraca błąd.
  enabled: true

  # Język pluginu — wczytuje plik Translations/<language>.yml
  # Dostępne: pl, en. Brakujący klucz → fallback do pl.yml.
  language: "pl"


# ════════════════════════════════════════════════════════════════════════════
#  2. DEBUG — logowanie diagnostyczne
# ════════════════════════════════════════════════════════════════════════════
debug:
  # Verbose logi diagnostyczne (DebugLogger). Włączać tylko podczas diagnozy problemu.
  enabled: false

  # Dodatkowo loguj operacje bazy danych (tylko gdy debug.enabled: true).
  log-database-operations: false


# ════════════════════════════════════════════════════════════════════════════
#  3. DATABASE — przechowywanie danych
# ════════════════════════════════════════════════════════════════════════════
database:
  # Typ bazy: SQLITE, MYSQL lub MARIADB.
  type: "SQLITE"

  # Prefiks tabel SQL.
  table-prefix: "cls_"

  # ── SQLite ──────────────────────────────────────────────────────────────
  sqlite:
    file: "data.db"
    journal-mode: "WAL"

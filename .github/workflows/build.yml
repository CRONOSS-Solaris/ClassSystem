name: Build

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Gradle build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # `gradle check` runs the integrationTest source set per build.gradle.
      # The unit `test` task is intentionally disabled (CLAUDE.md "Build & test"),
      # so `build` is the right entry point.
      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload plugin JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ClassSystem-${{ github.sha }}
          path: build/libs/ClassSystem-*.jar
          if-no-files-found: error
          retention-days: 14
